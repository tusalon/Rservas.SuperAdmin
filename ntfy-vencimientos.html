<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar Vencimientos - Rservas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-2xl mx-auto">
        <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
            <h1 class="text-2xl font-bold mb-4">🔔 Verificador de Vencimientos</h1>
            <p class="text-gray-600 mb-4">Este script busca negocios que vencen mañana y envía notificaciones a ntfy.sh</p>
            
            <button id="btnVerificar" class="bg-pink-600 text-white px-4 py-2 rounded-lg hover:bg-pink-700">
                ▶️ Ejecutar verificación ahora
            </button>
            
            <div id="resultado" class="mt-4 p-4 bg-gray-50 rounded-lg hidden"></div>
        </div>
        
        <div class="bg-white rounded-xl shadow-sm p-6">
            <h2 class="text-lg font-bold mb-4">📱 Cómo recibir las notificaciones</h2>
            <ol class="list-decimal list-inside space-y-2 text-gray-700">
                <li>Instalá la app <strong>ntfy</strong> en tu móvil</li>
                <li>Suscribite al tema: <code class="bg-gray-100 px-2 py-1 rounded">rservas-vencimientos</code></li>
                <li>Ejecutá este script cada día para recibir alertas</li>
            </ol>
        </div>
    </div>

    <script src="supabase-config.js"></script>
    <script>
        async function verificarVencimientosManana() {
            const resultado = document.getElementById('resultado');
            resultado.classList.remove('hidden');
            resultado.innerHTML = '<p class="text-blue-600">🔍 Verificando negocios...</p>';
            
            try {
                // Calcular fecha de mañana
                const manana = new Date();
                manana.setDate(manana.getDate() + 1);
                const mananaStr = manana.toISOString().split('T')[0];
                
                // Buscar negocios que vencen mañana (dias_para_renovar = 1)
                const { data: negocios, error } = await window.supabase
                    .from('vista_negocios_admin')
                    .select('*')
                    .eq('dias_para_renovar', 1);
                    
                if (error) throw error;
                
                if (negocios.length === 0) {
                    resultado.innerHTML = '<p class="text-green-600">✅ No hay negocios que venzan mañana.</p>';
                    return;
                }
                
                let html = `<p class="text-blue-600 mb-2">📊 ${negocios.length} negocio(s) encontrado(s):</p>`;
                html += '<ul class="list-disc list-inside space-y-2">';
                
                for (const neg of negocios) {
                    const fechaVencimiento = new Date(neg.proximo_pago).toLocaleDateString();
                    
                    // Enviar notificación
                    const mensaje = crearMensaje(neg);
                    const notifOk = await enviarNotificacion(neg, mensaje);
                    
                    html += `
                        <li class="${notifOk ? 'text-green-600' : 'text-red-600'} p-2 bg-gray-50 rounded">
                            <strong>${neg.nombre}</strong> - Vence: ${fechaVencimiento}
                            ${notifOk ? '✅ Notificación enviada' : '❌ Error al enviar'}
                        </li>
                    `;
                }
                
                html += '</ul>';
                resultado.innerHTML = html;
                
            } catch (error) {
                resultado.innerHTML = `<p class="text-red-600">❌ Error: ${error.message}</p>`;
            }
        }
        
        function crearMensaje(negocio) {
            const fechaVencimiento = new Date(negocio.proximo_pago).toLocaleDateString();
            
            return `
🔔 *PAGO PENDIENTE - MAÑANA*

🏢 *Negocio:* ${negocio.nombre}
📧 *Email:* ${negocio.email}
📱 *Teléfono:* ${negocio.telefono}
💳 *Plan:* ${negocio.plan_actual}
💰 *Monto:* $${negocio.monto_ultimo_pago || 'Pendiente'}
📅 *Vence:* ${fechaVencimiento}
⏰ *Días de aviso:* 1 día

⚠️ *Recordatorio:* Mañana vence el pago de este negocio.
`;
        }
        
        async function enviarNotificacion(negocio, mensaje) {
            try {
                const response = await fetch('https://ntfy.sh/rservas-vencimientos', {
                    method: 'POST',
                    body: mensaje,
                    headers: {
                        'Title': `⚠️ Vence mañana: ${negocio.nombre}`,
                        'Priority': 'high',
                        'Tags': 'calendar,rotating_light'
                    }
                });
                
                return response.ok;
            } catch (error) {
                console.error('Error:', error);
                return false;
            }
        }
        
        document.getElementById('btnVerificar').addEventListener('click', verificarVencimientosManana);
    </script>
</body>
</html>
