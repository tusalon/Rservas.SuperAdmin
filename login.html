<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Login - Rservas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gradient-to-br from-pink-900 to-purple-900 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white/10 backdrop-blur-lg rounded-xl p-8 max-w-md w-full border border-pink-500/30">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white">👑 Super Admin</h1>
            <p class="text-pink-300 mt-2">Acceso al panel de control</p>
        </div>

        <div id="mensaje" class="mb-4 text-sm text-center hidden"></div>
        
        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-pink-300 mb-2">Email</label>
                <input type="email" id="email" required
                       class="w-full px-4 py-3 rounded-lg bg-gray-800/50 border border-gray-600 text-white focus:ring-2 focus:ring-pink-500 focus:border-pink-500 outline-none transition"
                       placeholder="tuduenna@email.com">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-pink-300 mb-2">Contraseña</label>
                <input type="password" id="password" required
                       class="w-full px-4 py-3 rounded-lg bg-gray-800/50 border border-gray-600 text-white focus:ring-2 focus:ring-pink-500 focus:border-pink-500 outline-none transition"
                       placeholder="••••••••">
            </div>
            
            <button type="submit" 
                    class="w-full bg-gradient-to-r from-pink-600 to-purple-600 text-white py-3 rounded-lg font-semibold hover:from-pink-700 hover:to-purple-700 transition transform hover:scale-105">
                Entrar al Panel
            </button>
        </form>
        
        <div id="errorMsg" class="mt-4 text-red-500 text-sm text-center hidden"></div>
    </div>

    <script src="supabase-config.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const mensaje = document.getElementById('mensaje');
            
            errorMsg.classList.add('hidden');
            mensaje.classList.add('hidden');
            
            mensaje.textContent = 'Verificando...';
            mensaje.classList.remove('hidden');
            
            try {
                const { data, error } = await window.supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;

                // Verificar que sea el super admin
                if (email !== 'rservasroma@gmail.com') {
                    throw new Error('No tenés permisos de super admin');
                }

                console.log('✅ Login exitoso');
                mensaje.classList.add('hidden');
                window.location.href = 'index.html';
                
            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.classList.remove('hidden');
                mensaje.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
